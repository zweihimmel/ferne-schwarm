<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Ferne & Schwarm</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* --- Hintergrundinhalt-Setup --- */
        .contact-bg-content {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            background-color: white;
        }

        @media (min-width: 768px) {
            body { height: 200vh; } 
            .contact-bg-content {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                z-index: 1;
            }
        }

        /* --- Typografie & Layout (Linksbündig) --- */
        .contact-container {
            width: 100%;
            max-width: 700px;
            text-align: left;
            color: rgb(80, 80, 80);
            line-height: 1.8;
            font-family: Arial, sans-serif;
        }

        /* Titel: Kontakt (50px) */
        .contact-container h1 { 
            font-size: 50px; 
            margin-bottom: 40px; 
            color: rgb(153, 153, 153); 
            font-weight: bold;
            letter-spacing: 0.1em;
        }

        /* Nachricht (25px) */
        .contact-message {
            font-size: 25px;
            margin-bottom: 10px;
            color: #666;
        }

        /* E-Mail-Anzeige (Kein Link aus Sicherheitsgründen) */
        .email-display {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: rgb(80, 80, 80);
            margin-bottom: 30px;
            word-break: break-all;
            cursor: text;
            -webkit-user-select: all;
            user-select: all;
        }

        /* Hinweis (20px) */
        .note {
            font-size: 20px;
            color: #999;
            margin-top: 20px;
        }

        /* Mobile Anpassungen */
        @media (max-width: 767px) {
            .contact-container h1 { font-size: 28px; }
            .contact-message { font-size: 20px; }
            .email-display { font-size: 18px; }
            .note { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="contact-bg-content">
        <main class="contact-container">
            <h1>Kontakt</h1>
            
            <p class="contact-message">Bitte kontaktieren Sie mich hier:</p>
            
            <span id="email-address" class="email-display"></span>

            <p class="note">*Bitte beachten Sie, dass eine Antwort einige Tage in Anspruch nehmen kann.</p>
        </main>
    </div>

    <div class="overlay-panel">
        <nav class="lang-nav">
            <a href="../en/contact.html">en</a>
            <a href="../ja/contact.html">jp</a>
            <span class="lang-current-label">de</span>
        </nav>

        <div class="panel-content">
            <nav class="main-nav">
                <a href="index.html">top</a>
                <a href="about.html">about</a>
                <span class="nav-current-label">contact</span>
                <a href="privacy-policy.html">privacy policy</a>
            </nav>
            <p class="copyright">© 2026 Ferne & Schwarm</p>
        </div>
    </div>

    <script>
        /* --- E-Mail-Verschleierung --- */
        const u = "haso";     
        const d = "ymail.ne.jp";   
        const addr = u + "@" + d;
        
        document.getElementById('email-address').textContent = addr;

        /* --- Panel-Steuerung --- */
        const panel = document.querySelector('.overlay-panel');

        function handleScroll() {
            if (window.innerWidth >= 768) {
                const scrollY = window.scrollY;
                const windowHeight = window.innerHeight;
                const fullHeight = document.documentElement.scrollHeight;
                const scrollEnd = fullHeight - windowHeight;
                const scrollStart = scrollEnd - windowHeight;

                let progress = 0;
                if (scrollY > scrollStart) {
                    progress = (scrollY - scrollStart) / windowHeight;
                }
                progress = Math.max(0, Math.min(progress, 1));
                panel.style.transform = `translateY(${(1 - progress) * 100}%)`;

                if (progress > 0.9) panel.classList.add('active');
                else panel.classList.remove('active');
            } else {
                panel.style.transform = 'none';
                panel.classList.add('active');
            }
        }

        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        window.addEventListener('load', handleScroll);
        handleScroll();
    </script>
</body>
</html>
