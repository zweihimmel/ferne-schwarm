<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プルースト</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="./css/artwork-pages.css">
    
    <style>
        /* --- 全体レイアウト --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: white; font-family: Arial, sans-serif; overflow-x: hidden; }

        /* PC版：パネルを出すためのスクロール領域 */
        @media (min-width: 768px) { body { height: 200vh; } }

        .artwork-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 1; background-color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #media-wrapper {
            position: relative; width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            cursor: pointer; z-index: 3;
        }

        .artwork-img { width: 100%; height: 100%; object-fit: contain; display: block; }

        #gl-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 2; pointer-events: none; opacity: 0;
        }

        /* モバイル版：画像を縦に並べて自然にスクロール */
        @media (max-width: 767px) {
            .artwork-bg-container { position: relative; height: auto; }
            #media-wrapper { height: auto; cursor: pointer; }
            .artwork-img { height: auto; object-fit: contain; width: 100%; }
            #gl-canvas { display: none; }
            .overlay-panel { position: relative; transform: none; min-height: 100vh; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="artwork-bg-container">
        <div id="media-wrapper">
            </div>
        <canvas id="gl-canvas"></canvas>
    </div>

    <div class="overlay-panel">
        <nav class="lang-nav">
            <a href="../../en/artworks/artwork04.html">en</a>
            <span class="lang-current-label">jp</span>
            <a href="../../de/artworks/artwork04.html">de</a>
        </nav>
        <div class="panel-content">
            <div class="artwork-info">
                <h2 class="artwork-title">プルースト</h2>
                <p class="artwork-tech">版画29.7×21.0cm 紙に木版</p>
                <p class="artwork-credit">© 2026 Ferne & Schwarm</p>
                <div><a href="../../index.html" class="artwork-top-link">top</a></div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from '../../js/three.module.js';

        const wrapper = document.getElementById('media-wrapper');
        const canvas = document.getElementById('gl-canvas');
        const panel = document.querySelector('.overlay-panel');
        const isMobile = window.innerWidth < 768;

        // --- 画像パスの設定 ---
        const pcSrc = "../../images/full/artwork04.avif";
        const mbSrc1 = "../../images/full/artwork07.avif"; // モバイル用1枚目
        const mbSrc2 = "../../images/full/artwork08.avif"; // モバイル用2枚目
        const nextUrl = "artwork05.html";
        const shaderPath = "../../shaders/artwork_04.frag";

        // --- 画像の表示処理 ---
        if (!isMobile) {
            const img = document.createElement('img');
            img.src = pcSrc;
            img.className = 'artwork-img';
            wrapper.appendChild(img);
        } else {
            [mbSrc1, mbSrc2].forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'artwork-img';
                wrapper.appendChild(img);
            });
        }

        // --- モバイル用：ホワイトアウト演出 ---
        if (isMobile) {
            const fadeOverlay = document.createElement('div');
            fadeOverlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: white; opacity: 0; pointer-events: none;
                transition: opacity 1.2s ease-in-out; z-index: 9999;
            `;
            document.body.appendChild(fadeOverlay);

            wrapper.addEventListener('click', () => {
                fadeOverlay.style.opacity = "1";
                setTimeout(() => { window.location.href = nextUrl; }, 2300);
            });
        }

        // --- PC版限定：スクロールパネル制御 ---
        function handleScroll() {
            if (window.innerWidth >= 768) {
                const scrollY = window.scrollY;
                const windowHeight = window.innerHeight;
                const scrollStart = document.documentElement.scrollHeight - (windowHeight * 2);
                let progress = Math.max(0, Math.min((scrollY - scrollStart) / windowHeight, 1));
                panel.style.transform = `translateY(${(1 - progress) * 100}%)`;
                if (progress > 0.01) panel.classList.add('active');
                else panel.classList.remove('active');
            }
        }
        window.addEventListener('scroll', handleScroll);

        // --- PC版限定：GLSLエフェクト ---
        let scene, camera, renderer, material, texture, startTime;
        let isAnimating = false;
        let isReady = false;

        async function initShader() {
            if (isMobile || isReady) return;
            
            const loader = new THREE.TextureLoader();
            return new Promise((resolve) => {
                loader.load(pcSrc, async (loadedTexture) => {
                    texture = loadedTexture;
                    const resp = await fetch(shaderPath);
                    const frag = await resp.text();

                    scene = new THREE.Scene();
                    camera = new THREE.Camera();
                    renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: false });
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    renderer.setSize(window.innerWidth, window.innerHeight);

                    // アスペクト比計算
                    const imageAspect = texture.image.width / texture.image.height;
                    const screenAspect = window.innerWidth / window.innerHeight;
                    let planeW = 2.0, planeH = 2.0;
                    if (imageAspect > screenAspect) planeH = 2.0 * (screenAspect / imageAspect);
                    else planeW = 2.0 * (imageAspect / screenAspect);

                    material = new THREE.ShaderMaterial({
                        uniforms: {
                            u_texture: { value: texture },
                            u_time: { value: 0.0 },
                            u_active: { value: false },
                            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                        },
                        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                        fragmentShader: frag,
                        transparent: true
                    });

                    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(planeW, planeH), material));
                    isReady = true;
                    resolve();
                });
            });
        }

        function render() {
            if (!isAnimating) return;
            material.uniforms.u_time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
            
            if (material.uniforms.u_time.value < 1.8) {
                requestAnimationFrame(render);
            } else {
                window.location.href = nextUrl;
            }
        }

        if (!isMobile) {
            wrapper.addEventListener('click', async () => {
                if (isAnimating || panel.classList.contains('active')) return;
                if (!isReady) await initShader();

                isAnimating = true;
                startTime = Date.now();
                material.uniforms.u_active.value = true;
                canvas.style.opacity = "1";
                wrapper.style.visibility = "hidden";
                render();
            });

            window.addEventListener('load', () => {
                initShader();
                handleScroll();
            });
        }
    </script>
</body>
</html>
