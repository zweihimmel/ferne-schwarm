    <script>
        // --- イントロ制御ロジック ---
        document.addEventListener('DOMContentLoaded', () => {
    const intro = document.getElementById('intro-screen');
    
    // 1. セッションに「見たよ」という記録があるか確認
    const hasSeenIntro = sessionStorage.getItem('visited');

    if (hasSeenIntro) {
        // 2. すでに見ている場合は、イントロ画面を即座に消す
        if (intro) {
            intro.style.display = 'none';
        }
    } else {
        // 3. 初めて来た場合は、通常通り表示して記録を残す
        sessionStorage.setItem('visited', 'true');
        
        // （既存のフェードアウト処理などがここに入る）
        // 例: setTimeout(() => { intro.style.display = 'none'; }, 4000);
    }
});

        // --- パネルのスクロール制御 ---
        const panel = document.querySelector('.overlay-panel');

        function handleScroll() {
            if (window.innerWidth >= 768) {
                const scrollY = window.scrollY;
                const windowHeight = window.innerHeight;
                const fullHeight = document.documentElement.scrollHeight;
                const scrollEnd = fullHeight - windowHeight;
                const scrollStart = scrollEnd - windowHeight;

                let progress = 0;
                if (scrollY > scrollStart) {
                    progress = (scrollY - scrollStart) / windowHeight;
                }
                progress = Math.max(0, Math.min(progress, 1));
                panel.style.transform = `translateY(${(1 - progress) * 100}%)`;

                if (progress > 0.9) panel.classList.add('active');
                else panel.classList.remove('active');
            } else {
                panel.style.transform = 'none';
                panel.classList.add('active');
            }
        }

        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        window.addEventListener('load', handleScroll);
        handleScroll();
    </script>
</body>
